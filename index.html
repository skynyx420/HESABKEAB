<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>حسابیار — ورود</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{--bg:#0f1117;--s1:#161b27;--s2:#1d2436;--s3:#242b3d;--bd:#2a3149;--bd2:#364060;--tx:#e8eaf0;--tx2:#8b92a8;--tx3:#555e78;--blue:#4f8ef7;--bl:rgba(79,142,247,.15);--red:#f16063;--f:'Vazirmatn',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:32px;width:360px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo{width:52px;height:52px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 16px}
.title{text-align:center;font-size:18px;font-weight:700;margin-bottom:4px}.title b{color:var(--blue)}
.sub{text-align:center;font-size:12px;color:var(--tx2);margin-bottom:24px}
.fl{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.fl label{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.fl input{padding:9px 12px;font-size:13px;border:1px solid var(--bd2);border-radius:8px;background:var(--s2);color:var(--tx);width:100%;font-family:var(--f)}
.fl input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.btn{padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--blue);color:#fff;font-family:var(--f);width:100%;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .12s}
.btn:hover{opacity:.9}
.err{color:var(--red);font-size:11px;text-align:center;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">☕</div>
  <div class="title"><b>حساب</b>یار</div>
  <div class="sub">سیستم حسابداری کافه و رستوران</div>
  <div class="fl"><label>نام کاربری</label><input id="u" placeholder="admin" onkeydown="if(event.key==='Enter')login()"></div>
  <div class="fl"><label>رمز عبور</label><input type="password" id="p" placeholder="••••" onkeydown="if(event.key==='Enter')login()"></div>
  <button class="btn" onclick="login()"><i class="ti ti-login"></i>ورود</button>
  <div class="err" id="err"></div>
</div>
<script>
const SU='https://knobnksebpcttusbmbmn.supabase.co';
const SK='sb_publishable_3z8aH4ElwM5kBkTe0lvs9A__I7QA1OL';
// اگه قبلا لاگین کرده، مستقیم برو به برنامه
if(sessionStorage.getItem('hesabyar_user')){location.href='main.html'}
async function login(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value.trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){err.style.display='block';err.textContent='نام کاربری و رمز را وارد کنید';return}
  try{
    const resp=await fetch(`${SU}/rest/v1/app_users?username=eq.${encodeURIComponent(u)}`,{headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    if(!resp.ok){const t=await resp.text();err.style.display='block';err.textContent='خطای دیتابیس: '+t;return}
    const rows=await resp.json();
    if(!Array.isArray(rows)||!rows.length){err.style.display='block';err.textContent='کاربری با این نام یافت نشد';return}
    if(String(rows[0].password)!==String(p)){err.style.display='block';err.textContent='رمز اشتباه است';return}
    if(rows[0].is_active===false){err.style.display='block';err.textContent='این کاربر غیرفعال است';return}
    sessionStorage.setItem('hesabyar_user',JSON.stringify(rows[0]));
    location.href='main.html';
  }catch(e){err.style.display='block';err.textContent='خطا: '+e.message}
}
</script>
</body>
</html>
